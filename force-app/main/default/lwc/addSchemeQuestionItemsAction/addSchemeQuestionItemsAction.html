            </div>

                        <tbody>
                            <template for:each={questionItemRecords} for:item="item">
                                <tr key={item.Id} class="question-row">
                                    <td>
                                        <lightning-input type="checkbox" data-id={item.Id} checked={item.selected}
                                            disabled={item.alreadyAdded} onchange={handleRowToggle}>
                                        </lightning-input>
                                    </td>
                                    <td>
                                        <lightning-input type="number" variant="label-hidden" data-id={item.Id}
                                            data-field="SL_No__c" value={item.SL_No__c} disabled={item.alreadyAdded}
                                            onchange={handleFieldChange}>
                                        </lightning-input>
                                    </td>
                                    <td>
                                        <lightning-textarea variant="label-hidden" data-id={item.Id}
                                            data-field="Question__c" value={item.Question__c}
                                            disabled={item.alreadyAdded} onchange={handleFieldChange}>
                                        </lightning-textarea>

                                        <!-- Friendly inline notice for rows already saved -->
                                        <template if:true={item.alreadyAdded}>
                                            <div
                                                class="slds-text-body_small slds-text-color_success slds-m-top_xx-small">
                                                <lightning-icon icon-name="utility:success" size="xx-small"
                                                    class="slds-m-right_xx-small">
                                                </lightning-icon>
                                                {item.addedMessage}
                                            </div>
                                        </template>
                                    </td>
                                    <td>
                                        <lightning-input type="text" variant="label-hidden" data-id={item.Id}
                                            data-field="Section__c" value={item.Section__c} disabled={item.alreadyAdded}
                                            onchange={handleFieldChange}>
                                        </lightning-input>
                                    </td>
                                    <td>
                                        <lightning-combobox variant="label-hidden" value={item.Stage__c}
                                            options={stageOptions} data-id={item.Id} disabled={item.alreadyAdded}
                                            onchange={handleStageChange}>
                                        </lightning-combobox>
                                    </td>
                                    <td>
                                        <lightning-combobox variant="label-hidden" value={item.Type__c}
                                            options={typeOptions} data-id={item.Id} disabled={item.alreadyAdded}
                                            onchange={handleTypeChange}>
                                        </lightning-combobox>
                                    </td>
                                    <td>
                                        <lightning-textarea variant="label-hidden" data-id={item.Id}
                                            data-field="Picklist_Values__c" value={item.Picklist_Values__c}
                                            disabled={item.alreadyAdded} onchange={handleFieldChange}>
                                        </lightning-textarea>
                                    </td>
                                    <td>
                                        <lightning-input type="number" variant="label-hidden" data-id={item.Id}
                                            data-field="Max_Character__c" value={item.Max_Character__c}
                                            disabled={item.alreadyAdded} onchange={handleFieldChange}>
                                        </lightning-input>
                                    </td>
                                    <td>
                                        <lightning-input type="number" variant="label-hidden" data-id={item.Id}
                                            data-field="Min_Character__c" value={item.Min_Character__c}
                                            disabled={item.alreadyAdded} onchange={handleFieldChange}>
                                        </lightning-input>
                                    </td>
                                    <td>
                                        <lightning-input type="checkbox" data-id={item.Id} data-field="Mandatory__c"
                                            checked={item.Mandatory__c} disabled={item.alreadyAdded}
                                            onchange={handleFieldChange}>
                                        </lightning-input>
                                    </td>
                                    <td>
                                        <lightning-input type="checkbox" data-id={item.Id} data-field="Is_Active__c"
                                            checked={item.Is_Active__c} disabled={item.alreadyAdded}
                                            onchange={handleFieldChange}>
                                        </lightning-input>
                                    </td>
                                    <td>
                                        <lightning-combobox variant="label-hidden" value={item.Attachments__c}
                                            options={questionItemAttachmentsOptions} data-id={item.Id}
                                            placeholder="Select Attachments" disabled={item.alreadyAdded}
                                            onchange={handleQuestionItemAttachmentsChange}>
                                        </lightning-combobox>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
                <template if:true={noQuestionItemRecords}>
                    <p class="slds-text-color_weak slds-p-around_small">
                        No Scheme Questionnaires found for this Scheme Item.
                    </p>
                </template>
            </template>
        </template>

        <div class="slds-m-top_medium slds-text-align_right slds-border_top slds-p-top_small">
            <lightning-button label="Cancel" onclick={handleCancel} class="slds-m-right_small">
            </lightning-button>
            <lightning-button variant="brand" label="Save" onclick={handleSave} disabled={isSaving}>
            </lightning-button>
        </div>
